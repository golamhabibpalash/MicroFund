<div class="dashboard-wrapper">
  <!-- Top Header -->
  <header class="top-header">
    <h1>Dashboard</h1>
    <div class="user-info">
      <span class="user-name">{{ userEmail }}</span>
      <span class="material-icons">account_circle</span>
    </div>
  </header>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let stat of stats">
      <div class="stat-icon" [style.background-color]="stat.color">
        <span class="material-icons">{{ stat.icon }}</span>
      </div>
      <div class="stat-info">
        <span class="stat-value">{{ stat.value }}</span>
        <span class="stat-label">{{ stat.label }}</span>
      </div>
    </div>
  </div>

  <!-- Recent Transactions -->
  <div class="content-section">
    <div class="section-header">
      <h2>Recent Transactions</h2>
      <a routerLink="/payments" class="view-all">View All</a>
    </div>
    <div class="transactions-table">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let tx of recentTransactions">
            <td>
              <span
                class="tx-type"
                [class.investment]="tx.type === 'Investment'"
                [class.payment]="tx.type === 'Payment'"
                [class.withdrawal]="tx.type === 'Withdrawal'"
              >
                {{ tx.type }}
              </span>
            </td>
            <td class="amount">{{ tx.amount }}</td>
            <td>{{ tx.date }}</td>
            <td>
              <span
                class="status"
                [class.completed]="tx.status === 'Completed'"
                [class.pending]="tx.status === 'Pending'"
              >
                {{ tx.status }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
